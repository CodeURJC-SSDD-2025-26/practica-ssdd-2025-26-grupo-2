spring.application.name=backend
spring.autoconfigure.exclude=\
org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
logging.level.org.springframework.web=DEBUG
spring.mustache.suffix=.html
# Conexión a la base de datos que acabas de crear -> si no teneis mysql descargado y una base de datos llamada ByeBye con la misma contraseña comentar esto para q os funcione
spring.datasource.url=jdbc:mysql://localhost:3306/ByeBye?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123

# Hibernate: Esto hará que Spring cree las tablas por ti al arrancar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto requerido por la práctica para HTTPS
server.port=8443