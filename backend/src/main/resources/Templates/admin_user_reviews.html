{{>header}}

<input type="hidden" id="tokenCsrf" value="{{tokenSeguridad}}">
<input type="hidden" id="userIdGlobal" value="{{targetUser.id}}">

<div class="container mt-5">
    <div class="row mb-4 justify-content-between align-items-center">
        <div class="col-lg-8">
            {{#targetUser}}
            <h2 class="section-title">Moderación de reseñas: <span class="text-primary">{{nombre}}</span></h2>
            <p class="text-muted">{{email}}</p>
            {{/targetUser}}
        </div>
        <div class="col-lg-3 text-right">
            <a href="/userManagement.html" class="btn btn-outline-primary btn-sm">Volver a Usuarios</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped m-0">
                <thead class="thead-dark">
                    <tr>
                        <th>Viaje</th>
                        <th>Comentario</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {{#userReviews}}
                    <tr id="fila-{{id}}">
                        <td><strong>{{#viaje}}{{nombre}}{{/viaje}}</strong></td>
                        <td>"{{comentario}}"</td>
                        <td>
                            <button type="button" class="btn btn-danger btn-sm" onclick="borrarReview('{{id}}')">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                    {{/userReviews}}
                    {{^userReviews}}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">Este usuario no tiene reseñas.</td>
                    </tr>
                    {{/userReviews}}
                </tbody>
            </table>
        </div>
    </div>  
</div>

<script>
async function borrarReview(reviewId) {
    if (!confirm('¿Seguro que quieres eliminar esta reseña?')) return;

    const token = document.getElementById('tokenCsrf').value;
    
    const formData = new URLSearchParams();
    formData.append('reviewId', reviewId);
    formData.append('_csrf', token);

    try {
        const response = await fetch('/admin/reviews/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });

        if (response.ok) {
            // CORREGIDO: Se añaden las comillas invertidas para que el ID sea dinámico
            const elemento = document.getElementById(`fila-${reviewId}`);
            if (elemento) {
                elemento.remove();
            }
            alert('Reseña eliminada correctamente');
        } else {
            alert('Error al eliminar: El servidor respondió con error ' + response.status);
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error de conexión');
    }
}
</script>

{{>footer}}
