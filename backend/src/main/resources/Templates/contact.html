{{>header}}
<div class="hero hero-inner">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6 mx-auto text-center">
        <div class="intro-wrap">
          <h1 class="mb-0">Contáctanos</h1>
        </div>
      </div>
    </div>
  </div>
</div>



<div class="untree_co-section">
  <div class="container">
    <div class="row">
      <div class="col-lg-6 mb-5 mb-lg-0">
        <form class="contact-form" action="/contact" method="post" data-aos="fade-up" data-aos-delay="200">
          <input type="hidden" name="_csrf" value="{{token}}">
          <div class="row">
            <div class="col-6">
              <div class="form-group">
                <label class="text-black" for="fname">Nombre</label>
                <input type="text" class="form-control" id="fname" name="nombre" required>
              </div>
            </div>
            <div class="col-6">
              <div class="form-group">
                <label class="text-black" for="lname">Apellidos</label>
                <input type="text" class="form-control" id="lname" name="apellidos" required>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="text-black" for="email">Dirección de correo</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label class="text-black" for="message">Mensaje</label>
            <textarea class="form-control" id="message" name="mensaje" cols="30" rows="5" required></textarea>
          </div>

          {{#enviado}}
          <div class="alert alert-success mb-3">¡Mensaje enviado correctamente!</div>
          <script>
            window.history.replaceState({}, document.title, "/contact.html");
          </script>
          {{/enviado}}

          <button type="submit" class="btn btn-primary">Enviar Mensaje</button>
        </form>
      </div>
      <div class="col-lg-5 ml-auto">
        <div class="quick-contact-item d-flex align-items-center mb-4">
          <span class="flaticon-house"></span>
          <address class="text">
            Calle Tulipán, s/n, 28933 Móstoles, Madrid
          </address>
        </div>
        <div class="quick-contact-item d-flex align-items-center mb-4">
          <span class="flaticon-phone-call"></span>
          <address class="text">
            +34 123 456 789
          </address>
        </div>
        <div class="quick-contact-item d-flex align-items-center mb-4">
          <span class="flaticon-mail"></span>
          <address class="text">
             byebye.application@gmail.com
          </address>
        </div>
      </div>
    </div>
  </div>
</div>

{{>footer}}
