{{>header}}

<form id="csrf-form" style="display:none;">
    <input type="hidden" name="_csrf" value="{{token}}">
</form>

<div class="hero hero-inner">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 mx-auto text-center">
                <div class="intro-wrap">
                    <h1 class="mb-0">Gestionar Usuarios</h1>
                </div>
            </div>
        </div>
    </div>
</div>
<br>
<div class="col-11-5 mx-auto mb-5">
    <br>
    <div class="row align-items-center gap-3">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="buscadorUsuario" placeholder="Buscar usuario por correo...">
        </div>
        <a href="/graphUser.html" class="btn btn-adv mx-3">Ver gráficos</a>
    </div>
</div>

<table class="tabla-admin">
    <thead>
        <tr>
            <th>Correo electrónico</th>
            <th>Nombre</th>
            <th>Roles</th>
            <th class="col-1">Imagen</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {{#usuarios}}
        <tr>
            <td>
                <div>
                    <p>{{email}}</p>
                </div>
            </td>

            <td>
                <div>
                    <p>{{nombre}}</p>
                </div>
            </td>

            <td>
                <div>
                    <p>{{roles}}</p>
                </div>
            </td>

            <td>
                {{#imagenPerfil}}
                <img src="/usuario/{{idParaImagen}}/imagen"
                    class="rounded-circle img-thumbnail profile-img1 img-fluid d-xl-inline-block"> 
                {{/imagenPerfil}}

                {{^imagenPerfil}}
                <img src="/images/default_profile.jpg" alt="Perfil"
                    class="rounded-circle img-thumbnail profile-img1 img-fluid d-xl-inline-block">
                {{/imagenPerfil}}
            </td>

            <td>
                <div class="botones-admin-user text-center">
                    <button class="btn btn-rm" data-id="{{id}}">Eliminar</button>
                    <button class="btn btn-primary rImg" data-id="{{id}}">Reestablecer imagen</button>
                    <button class="btn btn-primary adv">Aviso</button>
                    
                    <a href="/admin/usuarios/{{id}}/reseñas" class="btn btn-primary">Reseñas</a>
                    
                    <button class="btn btn-primary">Viajes</button>
                </div>
            </td>
        </tr>
        {{/usuarios}}
    </tbody>
</table>

<script>
    document.addEventListener("click", async function (e) {
        if (e.target.classList.contains("btn-rm")) {
            const userId = e.target.getAttribute("data-id");
            const confirmDelete = confirm("¿Estás seguro de que quieres eliminar este usuario?");
            if (!confirmDelete) return;

            const motivo = prompt("Indique el motivo de la eliminación:");
            if (!motivo || motivo.trim() === "") {
                alert("Debe indicar un motivo.");
                return;
            }

            const response = await fetch(`/admin/usuarios/eliminar/${userId}`, {
                method: 'POST',
                headers: { 'X-CSRF-TOKEN': document.querySelector('input[name="_csrf"]').value } 
            });

            if (response.ok) {
                e.target.closest("tr").remove();
                alert("Usuario eliminado correctamente.");
            } else {
                alert("Error en el servidor al intentar eliminar.");
            }
        }
    });

    document.addEventListener("click", function (e) {
        if (e.target.classList.contains("adv")) {
            const motivo = prompt("Escriba el aviso que desee enviar:");
            if (motivo === null || motivo.trim() === "") {
                alert("Debe indicar un aviso.");
                return;
            }
        }
    });

    document.addEventListener("click", async function (e) {
        if (e.target.classList.contains("rImg")) {
            const userId = e.target.getAttribute("data-id");
            if (!confirm("¿Reestablecer imagen de perfil?")) return;

            const response = await fetch(`/admin/usuarios/reset-imagen/${userId}`, {
                method: 'POST',
                headers: { 'X-CSRF-TOKEN': document.querySelector('input[name="_csrf"]').value }
            });

            if (response.ok) {
                const fila = e.target.closest("tr");
                const img = fila.querySelector("img");
                img.src = "/images/default_profile.jpg";
                alert("Imagen reestablecida.");
            } else {
                alert("Error al resetear la imagen.");
            }
        }
    });

    document.getElementById("buscadorUsuario").addEventListener("input", function () {
        const filtro = this.value.toLowerCase();
        const filas = document.querySelectorAll("tbody tr");

        filas.forEach(fila => {
            const email = fila.querySelector("td p").textContent.toLowerCase();
            fila.style.display = email.includes(filtro) ? "" : "none";
        });
    });
</script>

{{>footer}}
