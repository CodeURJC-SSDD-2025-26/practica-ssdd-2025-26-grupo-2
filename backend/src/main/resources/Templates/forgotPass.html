{{>header}}

<div class="hero hero-inner">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6 mx-auto text-center">
        <div class="intro-wrap">
          <h1 class="mb-0">Recuperar contraseña</h1>
          <p class="text-white">Introduce tu correo y tu nueva contraseña.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">

      {{#error}}
      <div class="alert alert-danger">
        {{error}}
      </div>
      {{/error}}

      {{#success}}
      <div class="alert alert-success">
        {{success}}
      </div>
      {{/success}}

      <form action="/forgot-password" method="post" class="bg-white p-4 shadow-sm border rounded">
        <div class="form-group mb-3">
          <label class="text-black" for="email">Correo electrónico</label>
          <input type="email" class="form-control" name="email" id="email" required>
        </div>

        <div class="form-group mb-3">
          <label class="text-black" for="newPassword">Nueva contraseña</label>
          <input type="password" class="form-control" name="newPassword" id="newPassword" required>
        </div>

        <div class="form-group mb-4">
          <label class="text-black" for="confirmPassword">Confirmar nueva contraseña</label>
          <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" required>
        </div>

        <input type="hidden" name="_csrf" value="{{token}}">

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Confirmar</button>
          <a href="/signin" class="btn btn-rm">Volver</a>
        </div>
      </form>

    </div>
  </div>
</div>

{{>footer}}
