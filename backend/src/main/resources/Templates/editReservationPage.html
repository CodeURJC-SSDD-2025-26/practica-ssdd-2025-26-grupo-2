{{>header}}

<div class="hero hero-inner">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 mx-auto text-center">
                <div class="intro-wrap">
                    <h1 class="mb-0">Editar reserva</h1>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="bg-white p-4 shadow-sm border rounded">

                <h2 class="section-title mb-4 text-center"><b>Modificar número de personas</b></h2>

                <form action="/reservations/{{reservation.id}}/edit" method="post">
                    <input type="hidden" name="_csrf" value="{{token}}">

                    <div class="form-group mb-3">
                        <label class="text-black"><b>Viaje</b></label>
                        <input type="text" class="form-control"
                            value="{{reservation.viaje.nombre}} - {{reservation.viaje.pais}}" readonly>
                    </div>

                    <div class="form-group mb-3">
                        <label class="text-black" for="numeroPersonas"><b>Número de personas</b></label>
                        <input type="number" class="form-control" id="numeroPersonas" name="numeroPersonas" min="1"
                            value="{{reservation.numeroPersonas}}" required>
                    </div>

                    <div class="form-group mb-3">
                        <label class="text-black"><b>Precio por persona</b></label>
                        <input type="text" class="form-control" value="{{reservation.viaje.precio}} €" readonly>
                    </div>

                    <div class="form-group mb-4">
                        <label class="text-black"><b>Precio actual total</b></label>
                        <input type="text" class="form-control" value="{{reservation.precioTotal}} €" readonly>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        <a href="/userProfile.html" class="btn btn-rm">Cancelar</a>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

{{>footer}}
