{{>header}}

<div class="hero hero-inner">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 mx-auto text-center">
                <div class="intro-wrap">
                    <h1 class="mb-0">Añadir viaje</h1>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5 mb-5">
    <form action="/nuevoviaje" method="POST" class="contact-form bg-white p-4 shadow-sm border rounded">
        <input type="hidden" name="_csrf" value="{{token}}">
        
        {{#error}}
        <div class="alert alert-danger text-center font-weight-bold" role="alert">
            {{error}}
        </div>
        {{/error}}
        
        
        <div class="row">
            <div class="col-md-6">
                <div class="form-group mb-3">
                    <label class="text-black" for="name">Nombre del destino</label>
                    <input type="text" class="form-control" name="nombre" id="name" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="pais">País</label>
                    <input type="text" class="form-control" name="pais" id="pais" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="price">Precio (€)</label>
                    <input type="number" class="form-control" name="precio" id="price" min="0" step="0.01" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="transport">Transporte</label>
                    <input type="text" class="form-control" name="transporte" id="transport" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="accommodation">Alojamiento</label>
                    <input type="text" class="form-control" name="alojamiento" id="accommodation" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group mb-3">
                    <label class="text-black" for="travelers">Personas por reserva</label>
                    <input type="number" class="form-control" name="maxPlazas" id="travelers" min="1" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="numNoches">Número de noches</label>
                    <input type="number" class="form-control" name="numNoches" id="numNoches" min="1" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="startDate">Fecha inicio</label>
                    <input type="date" class="form-control" name="fechaInicio" id="startDate" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="endDate">Fecha fin</label>
                    <input type="date" class="form-control" name="fechaFin" id="endDate" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="filePicker">Imagen del viaje</label>
                    <input type="file" class="form-control" id="filePicker" accept="image/*" required>                    <input type="hidden" name="imagenOculta" id="imagenOculta">
                </div>
            </div>

            <div class="col-12">
                <div class="form-group mb-4">
                    <label class="text-black" for="description">Descripción del viaje</label>
                    <textarea name="descripcion" id="description" class="form-control" cols="30" rows="5"
                        placeholder="Escribe aquí los detalles del viaje..." required></textarea>
                </div>
            </div>

            <div class="col-12 text-center">
                <button type="reset" class="btn btn-outline-secondary mr-2">Limpiar</button>
                <button type="submit" class="btn btn-primary">Guardar y Añadir viaje</button>
            </div>
        </div>
    </form>
</div>

<script>
    document.getElementById('filePicker').addEventListener('change', function(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagenOculta').value = e.target.result;
        };
        if(file) reader.readAsDataURL(file);
    });
</script>

{{>footer}}
