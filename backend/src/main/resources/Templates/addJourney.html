<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Untree.co">
    <link rel="shortcut icon" href="Logo sin fondo.png">

    <meta name="description" content="" />
    <meta name="keywords" content="bootstrap, bootstrap4" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Source+Serif+Pro:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/jquery.fancybox.min.css">
    <link rel="stylesheet" href="fonts/icomoon/style.css">
    <link rel="stylesheet" href="fonts/flaticon/font/flaticon.css">
    <link rel="stylesheet" href="css/daterangepicker.css">
    <link rel="stylesheet" href="css/aos.css">
    <link rel="stylesheet" href="css/style.css">

    <title>ByeBye.com</title>
</head>

<body>

   
     <!-- header -->

    {{>header}}
    <!-- end of header -->


    <div class="hero hero-inner">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 mx-auto text-center">
                    <div class="intro-wrap">
                        <h1 class="mb-0">Añadir viaje</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <div class="container mt-5 mb-5">
        <form class="contact-form bg-white p-4 shadow-sm border rounded">
            <div class="row justify-content-center align-items-stretch">
                <div class="col-md-6">
                    <div class="form-group mb-3">
                        <label class="text-black" for="name">Nombre</label>
                        <input type="text" class="form-control" id="name" pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+"
                            title="Solo se permiten letras" required>
                    </div>
                    <div class="form-group mb-4">
                        <label class="text-black" for="country">País</label>
                        <input type="text" class="form-control" id="country" pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+"
                            title="Solo se permiten letras" required>
                    </div>
                    <div class="form-group mb-3">
                        <label class="text-black" for="price">Precio</label>
                        <input type="number" class="form-control" id="price" min="0" step="1" required>
                    </div>
                    <div class="form-group mb-4">
                        <label class="text-black" for="transport">Transporte</label>
                        <input type="text" class="form-control" id="transport" pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+"
                            title="Solo se permiten letras" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group mb-3">
                        <label class="text-black" for="accommodation">Alojamiento</label>
                        <input type="text" class="form-control" id="accommodation" pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+"
                            title="Solo se permiten letras" required>
                    </div>

                    <div class="form-group mb-4">
                        <label class="text-black" for="travelers">Personas por reserva</label>
                        <select name="travelers" id="travelers" class="form-control custom-select" required>
                            <option value="">Seleccione una opción</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </div>

                    <div class="form-group mb-4">
                        <label class="text-black" for="startDate">Fecha inicio</label>
                        <input type="date" class="form-control" id="startDate" required>
                    </div>
                    <div class="form-group mb-4">
                        <label class="text-black" for="endDate">Fecha fin</label>
                        <input type="date" class="form-control" id="endDate" required>
                    </div>
                </div>
                <div class="mb-3 col-12 text-center">
                    <div class="form-group mb-4">
                        <div class="mb-3">
                            <label for="formFileMultiple" class="form-label">Adjunte las imágenes que desee
                                mostrar</label>
                            <input class="form-control" type="file" id="formFileMultiple" accept="image/png, image/jpeg"
                                multiple>
                        </div>
                    </div>

                    <div class="col-12 text-center mt-3">
                        <button type="reset" class="btn btn-primary mr-2">Reiniciar</button>
                        <button type="submit" class="btn btn-primary">Añadir viaje</button>
                    </div>

                </div>
        </form>
    </div>
    </div>

    {{>footer}}



    <script src="js/jquery-3.4.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery.animateNumber.min.js"></script>
    <script src="js/jquery.waypoints.min.js"></script>
    <script src="js/jquery.fancybox.min.js"></script>
    <script src="js/aos.js"></script>
    <script src="js/moment.min.js"></script>
    <script src="js/daterangepicker.js"></script>

    <script src="js/typed.js"></script>

    <script src="js/custom.js"></script>


</body>

</html>
