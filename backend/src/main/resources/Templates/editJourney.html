{{>header}}

<div class="hero hero-inner">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 mx-auto text-center">
                <div class="intro-wrap">
                    <h1 class="mb-0">Editar viaje: {{viaje.nombre}}</h1>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5 mb-5">
    <form action="/modificarviaje" method="POST" class="contact-form bg-white p-4 shadow-sm border rounded">
        <input type="hidden" name="id" value="{{viaje.id}}">
        
        <input type="hidden" name="_csrf" value="{{token}}">

        <div class="row">
            <div class="col-md-6">
                <div class="form-group mb-3">
                    <label class="text-black" for="name">Nombre del destino</label>
                    <input type="text" class="form-control" name="nombre" id="name" value="{{viaje.nombre}}" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="pais">País</label>
                    <input type="text" class="form-control" name="pais" id="pais" value="{{viaje.pais}}" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="price">Precio (€)</label>
                    <input type="number" class="form-control" name="precio" id="price" min="0" step="0.01" value="{{viaje.precio}}" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="transport">Transporte</label>
                    <input type="text" class="form-control" name="transporte" id="transport" value="{{viaje.transporte}}" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="accommodation">Alojamiento</label>
                    <input type="text" class="form-control" name="alojamiento" id="accommodation" value="{{viaje.alojamiento}}" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group mb-3">
                    <label class="text-black" for="travelers">Personas por reserva</label>
                    <input type="number" class="form-control" name="maxPlazas" id="travelers" min="1" value="{{viaje.maxPlazas}}" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="numNoches">Número de noches</label>
                    <input type="number" class="form-control" name="numNoches" id="numNoches" min="1" value="{{viaje.numNoches}}" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="startDate">Fecha inicio</label>
                    <input type="date" class="form-control" name="fechaInicio" id="startDate" value="{{viaje.fechaInicio}}" required>
                </div>
                <div class="form-group mb-3">
                    <label class="text-black" for="endDate">Fecha fin</label>
                    <input type="date" class="form-control" name="fechaFin" id="endDate" value="{{viaje.fechaFin}}" required>
                </div>

                <div class="form-group mb-3">
                    <label class="text-black">Imagen actual</label>
                    <div class="mb-2">
                        {{#viaje.imagen}}
                            <img src="/viajes/{{viaje.id}}/imagen" alt="Imagen actual" style="width: 100px; height: auto;" class="img-thumbnail d-block mb-2">
                        {{/viaje.imagen}}
                        {{^viaje.imagen}}
                            <p class="text-muted small">No hay imagen asignada.</p>
                        {{/viaje.imagen}}
                    </div>
                    
                    <label class="text-black" for="filePicker">Subir nueva imagen (reemplaza a la anterior)</label>
                    <input type="file" class="form-control" id="filePicker" accept="image/*">
                    <input type="hidden" name="imagenOculta" id="imagenOculta">
                </div>
            </div>

            <div class="col-12">
                <div class="form-group mb-4">
                    <label class="text-black" for="description">Descripción del viaje</label>
                    <textarea name="descripcion" id="description" class="form-control" cols="30" rows="5" required>{{viaje.descripcion}}</textarea>
                </div>
            </div>

            <div class="col-12 text-center">
                <a href="/journeyManagement" class="btn btn-outline-secondary mr-2">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar cambios</button>
            </div>
        </div>
    </form>
</div>

<script>
    document.getElementById('filePicker').addEventListener('change', function(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagenOculta').value = e.target.result;
        };
        if(file) reader.readAsDataURL(file);
    });
</script>

{{>footer}}
