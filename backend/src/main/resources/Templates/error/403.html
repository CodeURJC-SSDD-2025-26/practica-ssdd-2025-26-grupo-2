    {{>header}}

    <div class="hero hero-inner">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 mx-auto text-center">
                    <div class="intro-wrap">
                        <h1 class="mb-0">403</h1>
                        <p class="text-white mt-3">You do not have permission to access this page.</p>
                    </div>
                </div>
            </div>
        </div>

    <div class="container py-5">

            <div class="col-lg-8 text-center">
                <div class="bg-white p-5 shadow-sm border rounded">
                    <h2 class="section-title mb-4"><b>Access denied</b></h2>

                    </p>
                    <a href="/" class="btn btn-primary">Go back to home page</a>
