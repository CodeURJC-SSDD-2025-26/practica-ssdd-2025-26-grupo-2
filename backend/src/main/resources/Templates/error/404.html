<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Untree.co">
    <link rel="shortcut icon" href="Logo sin fondo.png">

    <meta name="description" content="" />
    <meta name="keywords" content="bootstrap, bootstrap4" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Source+Serif+Pro:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">

    <title>Page not found - ByeBye.com</title>
</head>

<body>

    {{>header}}

    <div class="hero hero-inner">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 mx-auto text-center">
                    <div class="intro-wrap">
                        <h1 class="mb-0">404</h1>
                        <p class="text-white mt-3">Page not found</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center">
                <div class="bg-white p-5 shadow-sm border rounded">
                    <h2 class="section-title mb-4"><b>Page not found</b></h2>
                    <p class="mb-4">
                        The page you are looking for does not exist or has been moved.
                    </p>
                    <a href="/" class="btn btn-primary">Go back to home page</a>
                </div>
            </div>
        </div>
    </div>

    {{>footer}}

    <script src="js/bootstrap.min.js"></script>

</body>

</html>
