<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="author" content="Untree.co">
  <link rel="shortcut icon" href="Logo sin fondo.png">

  <meta name="description" content="" />
  <meta name="keywords" content="bootstrap, bootstrap4" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Source+Serif+Pro:wght@400;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
    integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <link rel="stylesheet" href="css/owl.theme.default.min.css">
  <link rel="stylesheet" href="css/jquery.fancybox.min.css">
  <link rel="stylesheet" href="fonts/icomoon/style.css">
  <link rel="stylesheet" href="fonts/flaticon/font/flaticon.css">
  <link rel="stylesheet" href="css/daterangepicker.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/style.css">

  <title>ByeBye.com</title>
</head>

<body>

    {{>header}}


  <div class="hero hero-inner">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-6 mx-auto text-center">
          <div class="intro-wrap">
            <h1 class="mb-0">Identifícate</h1>
            <p class="text-white">Inicia sesión o create una cuenta con nosotros para disfrutar de
              nuestros viajes. </p>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div class="container py-5">
    <div class="row justify-content-center align-items-stretch">

      <div class="col-lg-5 mb-4">
        <div class="text-center">
          <h2 class="section-title text-center mb-4"><b> Regístrate</b></h2>
        </div>

        <form class="contact-form bg-white p-4 shadow-sm border rounded">
          <form action="/register" method="post" class="bg-white p-4 shadow-sm border rounded">
            <div class="row">
              <div class="col-md-6">
                <div class="form-group mb-3">
                  <label class="text-black" for="fname">Nombre</label>
                  <input type="text" class="form-control" name="nombre" id="fname" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" 
                    title="Solo se permiten letras" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group mb-3">
                  <label class="text-black" for="lname">Apellidos</label>
                  <input type="text" class="form-control" name="apellidos" id="lname" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+"
                    title="Solo se permiten letras" required>
                </div>
              </div>
            </div>

            <div class="form-group mb-3">
              <label class="text-black" for="email">Dirección de correo</label>
              <input type="email" class="form-control" name="correo" id="email" required>
              <small class="form-text text-muted">Nunca compartiremos tu correo.</small>
            </div>
            <div class="form-group mb-4">
              <label class="text-black" for="password">Contraseña</label>
              <input type="password" class="form-control" name= "contraseña" id="password" required>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" name="condciciones" id="checkIndeterminate" required>
              <label class="form-check-label" for="checkIndeterminate">
                Acepto los terminos y condiciones
              </label>
            </div><br>
            <button type="submit" class="btn btn-primary w-100">Enviar</button>
          </form>

      </div>

      <div class="col-lg-5 mb-4">
        <div class="text-center">
          <h2 class="section-title text-center mb-4"><b>Inicia sesión</b></h2>
        </div>

        <form class="contact-form bg-white p-4 shadow-sm border rounded">
          <div class="form-group mb-3">
            <label class="text-black" for="login-email">Dirección de correo</label>
            <input type="email" class="form-control" id="login-email" required>
          </div>
          <div class="form-group mb-4">
            <label class="text-black" for="login-password">Contraseña</label>
            <input type="password" class="form-control" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Enviar</button>
        </form>
      </div>

    </div>
  </div>








  {{>footer}}

    <script src="js/jquery-3.4.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery.animateNumber.min.js"></script>
    <script src="js/jquery.waypoints.min.js"></script>
    <script src="js/jquery.fancybox.min.js"></script>
    <script src="js/aos.js"></script>
    <script src="js/moment.min.js"></script>
    <script src="js/daterangepicker.js"></script>

    <script src="js/typed.js"></script>

    <script src="js/custom.js"></script>

</body>

</html>
